<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP Bus Tracker - Rastreador de Ônibus SP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-bus"></i>
                    <span>SP Bus Tracker</span>
                </div>
                <button id="toggleSidebar" class="btn-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <div class="sidebar-content">
                <!-- Busca -->
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Buscar linha (ex: 774A, Jabaquara)" autocomplete="off">
                        <button id="clearSearch" class="btn-clear hidden"><i class="fas fa-times"></i></button>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>

                <!-- Linha Selecionada -->
                <div id="lineInfo" class="line-info hidden">
                    <div class="line-header">
                        <div class="line-badge">
                            <span id="lineNumber" class="line-number">--</span>
                            <span id="lineDirection" class="line-direction">--</span>
                        </div>
                        <button id="closeLine" class="btn-close"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="line-details">
                        <p id="lineName" class="line-name">--</p>
                        <div class="line-meta">
                            <span id="vehicleCount"><i class="fas fa-bus"></i> -- ônibus</span>
                            <span id="lastUpdate"><i class="fas fa-clock"></i> --</span>
                        </div>
                    </div>
                    <div class="line-actions">
                        <button id="btnIda" class="btn-direction active" data-dir="1">
                            <i class="fas fa-arrow-up"></i> Ida
                        </button>
                        <button id="btnVolta" class="btn-direction" data-dir="2">
                            <i class="fas fa-arrow-down"></i> Volta
                        </button>
                        <button id="btnAll" class="btn-direction" data-dir="0">
                            <i class="fas fa-arrows-alt-v"></i> Todos
                        </button>
                    </div>
                </div>

                <!-- Lista de Ônibus -->
                <div id="vehiclesList" class="vehicles-list hidden">
                    <h3><i class="fas fa-bus"></i> Ônibus em circulação</h3>
                    <div id="vehiclesContainer" class="vehicles-container"></div>
                </div>

                <!-- Paradas -->
                <div id="stopsList" class="stops-list hidden">
                    <h3><i class="fas fa-map-marker-alt"></i> Paradas</h3>
                    <div id="stopsContainer" class="stops-container"></div>
                </div>

                <!-- Estado vazio -->
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-search-location"></i>
                    <h3>Busque uma linha</h3>
                    <p>Digite o número ou nome da linha para começar o rastreamento</p>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span id="connectionStatus" class="status-dot online"></span>
                    <span id="statusText">Conectado</span>
                </div>
                <span class="version">v1.0</span>
            </div>
        </aside>

        <!-- Mapa -->
        <main id="mapContainer" class="map-container">
            <div id="map"></div>
            
            <!-- Controles do mapa -->
            <div class="map-controls">
                <button id="btnLocate" class="map-btn" title="Minha localização">
                    <i class="fas fa-crosshairs"></i>
                </button>
                <button id="btnRefresh" class="map-btn" title="Atualizar agora">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button id="btnLayer" class="map-btn" title="Camadas">
                    <i class="fas fa-layer-group"></i>
                </button>
            </div>

            <!-- Legenda -->
            <div id="legend" class="map-legend hidden">
                <h4>Legenda</h4>
                <div class="legend-item">
                    <span class="legend-icon bus-ida"></span>
                    <span>Ônibus (Ida)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon bus-volta"></span>
                    <span>Ônibus (Volta)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon stop"></span>
                    <span>Parada</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon route-ida"></span>
                    <span>Rota (Ida)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon route-volta"></span>
                    <span>Rota (Volta)</span>
                </div>
            </div>

            <!-- Loading -->
            <div id="mapLoading" class="map-loading hidden">
                <div class="spinner"></div>
                <span>Carregando...</span>
            </div>
        </main>
    </div>

    <!-- Modal de previsão -->
    <div id="predictionModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-clock"></i> Previsão de Chegada</h3>
                <button class="btn-close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div id="predictionInfo" class="prediction-info"></div>
                <div id="predictionList" class="prediction-list"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
